<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de Creacion Escenica - Gerard Estrada</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #0a0a0a; --dark: #111; --card: #141414; --border: #1e1e1e; --cream: #e8dfc8; --gold: #c9a84c; --gold-light: #e8c97a; --white: #f5f0e8; --grey: #888; --grey-dark: #444; }
  html { scroll-behavior: smooth; }
  body { background: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .top-bar { width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 clamp(20px,5vw,60px); display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-brand { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--white); white-space: nowrap; }
  .nav-brand span { color: var(--gold); }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--grey); text-decoration: none; }
  .nav-links a:hover { color: var(--gold); }
  section { position: relative; z-index: 1; padding: clamp(60px,8vh,100px) clamp(24px,8vw,100px); background: var(--dark); }
  .hero { min-height: 92vh; display: flex; flex-direction: column; justify-content: center; }
  .hero-tag { font-size: 10px; font-weight: 300; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; margin-bottom: 28px; animation: fadeUp 0.8s ease both 0.2s; }
  .hero-title { animation: fadeUp 0.8s ease both 0.4s; }
  .hero-pre { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(24px,3vw,36px); color: var(--cream); opacity: 0.65; display: block; margin-bottom: 6px; }
  .hero-main { font-family: 'Bebas Neue', sans-serif; font-size: clamp(72px,12vw,140px); color: var(--white); line-height: 0.88; letter-spacing: 3px; display: block; }
  .hero-main span { color: var(--gold); }
  .hero-sub { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px,5vw,60px); color: var(--cream); opacity: 0.8; letter-spacing: 4px; display: block; margin-top: 4px; }
  .hero-desc { margin-top: 36px; max-width: 560px; animation: fadeUp 0.8s ease both 0.6s; }
  .hero-desc p { font-family: 'Cormorant Garamond', serif; font-size: clamp(17px,2vw,21px); font-weight: 300; font-style: italic; color: var(--cream); opacity: 0.75; line-height: 1.75; }
  .hero-desc strong { font-style: normal; font-weight: 600; color: var(--gold-light); }
  .hero-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 28px; animation: fadeUp 0.8s ease both 0.75s; }
  .tag { font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 5px 14px; }
  .tag.solid { background: var(--gold); color: var(--black); }
  .tag.outline { border: 1px solid var(--gold); color: var(--gold); opacity: 0.65; }
  .hero-cta { margin-top: 48px; animation: fadeUp 0.8s ease both 0.9s; }
  .cta-btn { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--black); background: var(--gold); padding: 16px 36px; text-decoration: none; }
  .cta-secondary { display: inline-block; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--grey); padding: 16px 24px; text-decoration: none; margin-left: 12px; }
  .section-divider { display: flex; align-items: center; gap: 20px; padding: 0 clamp(24px,8vw,100px); background: var(--dark); }
  .sdl { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
  .sdr { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .sdd { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
  .section-label { font-size: 9px; font-weight: 600; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 40px; }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 2px; }
  .info-cell { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--gold); padding: 28px; }
  .ic-label { font-size: 9px; font-weight: 600; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .ic-value { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--white); line-height: 1.3; }
  .ic-value.large { font-size: 30px; font-weight: 600; }
  .ic-value.gold { color: var(--gold-light); font-style: italic; }
  .ic-sub { font-size: 11px; color: var(--grey-dark); margin-top: 4px; }
  .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 2px; }
  .price-card { background: var(--card); border: 1px solid var(--border); padding: 36px 32px; position: relative; }
  .price-card.featured { background: #1a1500; border-color: var(--gold); }
  .price-card.featured::before { content: 'MEJOR OPCION'; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 600; letter-spacing: 3px; color: var(--black); background: var(--gold); padding: 4px 16px; white-space: nowrap; }
  .pc-tier { font-size: 9px; font-weight: 600; letter-spacing: 4px; color: var(--grey); text-transform: uppercase; margin-bottom: 16px; }
  .pc-amount { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: var(--white); line-height: 1; }
  .pc-currency { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 14px; vertical-align: super; }
  .pc-period { font-size: 9px; color: var(--grey); letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }
  .pc-desc { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--cream); opacity: 0.6; margin-top: 14px; line-height: 1.5; }
  .pc-saving { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 2px; color: var(--black); background: var(--gold); padding: 3px 10px; margin-top: 12px; }
  .pc-btn { display: block; text-align: center; font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-light); border: 1px solid var(--gold); padding: 13px 20px; text-decoration: none; margin-top: 24px; }
